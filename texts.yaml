# -------------------------
# БЫСТРЫЕ ОТВЕТЫ (если нужны)
# -------------------------
replies:
  unknown: "Я пока понимаю только кнопки 🙂 Нажми /start."
  hello: "Привет 🙂 Нажми кнопку в меню."
  how_are_you:
    - "Отлично! Готов работать 😄"
    - "Лучше всех!"
    - "Работаю, не отвлекаюсь 😎"

# -------------------------
# ВСЕ МЕНЮ (НАВИГАЦИЯ)
# -------------------------
menus:
  main:
    text: "start"
    rows:
      - [ {text: "ℹ️ О боте", cb: "screen:info"}, {text: "🌦 Погода", cb: "screen:weather"} ]
      - [ {text: "🔞 Раздел", cb: "menu:sex"}, {text: "💪 Халк", cb: "screen:hulk"} ]
      - [ {text: "🧠 Тест на тупость", cb: "menu:test_intro"} ]

  sex:
    text: "sex_root"
    rows:
      - [ {text: "Гачимучи", cb: "screen:sex_gachi"}, {text: "Голландский штурвал", cb: "screen:sex_helm"} ]
      - [ {text: "Садомазо", cb: "screen:sex_sado"}, {text: "Унижения", cb: "screen:sex_humor"} ]
      - [ {text: "Секс чат", cb: "screen:sex_chat"} ]
      - [ {text: "⬅️ Назад", cb: "menu:main"} ]

  test_intro:
    text: "test_intro"
  rows:
    - [ {text: "Да", cb: "menu:test_q1"}, {text: "Нет, но да", cb: "menu:test_q1"} ]
    - [ {text: "Я боюсь", cb: "screen:test_result_afraid"}, {text: "Я тупой", cb: "screen:test_result_stupid"} ]


  iq_yes:
    text: "iq_yes"
    rows:
      - [ {text: "3", cb: "screen:wrong"} ]
      - [ {text: "4", cb: "menu:iq_q2"} ]



