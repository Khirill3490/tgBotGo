# -------------------------
# ВСЕ МЕНЮ (НАВИГАЦИЯ)
# -------------------------
menus:
  main:
    text: "start"
    rows:
      - [ {text: "ℹ️ О боте", cb: "screen:info"}, {text: "🌦 Погода", cb: "screen:weather"} ]
      - [ {text: "🔞 Раздел", cb: "menu:sex"}, {text: "💪 Халк", cb: "screen:hulk"} ]
      - [ {text: "🧠 Тест на тупость", cb: "menu:test_intro"} ]

  sex:
    text: "sex_root"
    rows:
      - [ {text: "Гачимучи", cb: "screen:sex_gachi"}, {text: "Голландский штурвал", cb: "screen:sex_helm"} ]
      - [ {text: "Садомазо", cb: "screen:sex_sado"}, {text: "Унижения", cb: "screen:sex_humor"} ]
      - [ {text: "Секс чат", cb: "screen:sex_chat"} ]
      - [ {text: "⬅️ Назад", cb: "menu:main"} ]

  test_intro:
    text: "test_intro"
    rows:
      - [ {text: "Да", cb: "test:start"}, {text: "Нет, но да", cb: "test:start"} ]
      - [ {text: "Я боюсь", cb: "screen:test_afraid"}, {text: "Я тупой", cb: "screen:test_stupid"} ]

  test_afraid:
    text: "test_afraid"
    rows:
      - [ {text: "Погнали!", cb: "menu:test_q1"} ]
      - [ {text: "Я обкакался", cb: "screen:test_shit"} ]

  test_stupid:
    text: "test_stupid"
    rows:
      - [ {text: "Погнали!", cb: "menu:test_q1"} ]

  test_q1:
    text: "test_q1"
    rows:
      - [ {text: "1", cb: "answer:test_q1:a1"} ]
      - [ {text: "2", cb: "answer:test_q1:a2"} ]

  test_q2:
    text: "test_q2"
    rows:
      - [ {text: "3", cb: "answer:test_q2:a1"} ]
      - [ {text: "4", cb: "answer:test_q2:a2"} ]

  test_q3:
    text: "test_q3"
    rows:
      - [ {text: "5", cb: "answer:test_q3:a1"} ]
      - [ {text: "6", cb: "answer:test_q3:a2"} ]         



